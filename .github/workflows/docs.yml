name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.38
      - uses: actions/cache@v4
        with:
          path: docs/_freeze
          key: quarto-freeze-${{ hashFiles('docs/**/*.qmd', 'examples/**', 'src/heormodel/**', 'uv.lock') }}
          restore-keys: |
            quarto-freeze-
      - run: uv sync --extra docs
      - run: uv run quartodoc build --config docs/_quarto.yml
      - run: uv run quartodoc interlinks
        working-directory: docs
      - run: quarto render docs
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
