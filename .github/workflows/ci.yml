name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest --cov=heormodel --cov-report=xml
      - run: uv run pytest --doctest-modules src --cov=heormodel --cov-report=xml --cov-append
      - if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  colab-notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra docs
      - run: uv run python docs/build_colab_notebooks.py
      - name: Check the Colab notebooks and badges are up to date
        run: git diff --exit-code docs/tutorials docs/_notebooks
