project:
  type: website
  pre-render: _prerender.py
  resources:
    - robots.txt
    - llms.txt
    - images/og-card.png

lang: en

execute:
  # Reuse a tutorial's last computed output instead of re-running its code
  # when the .qmd source has not changed since. Results land in _freeze/
  # (gitignored; restored from the CI cache in .github/workflows/docs.yml).
  # This matters most for the calibration tutorials, whose fits take
  # minutes. To force one tutorial to re-execute, delete its directory
  # under docs/_freeze/ before rendering.
  freeze: auto

website:
  title: heormodel
  site-url: https://pedroliman.github.io/heormodel/
  repo-url: https://github.com/pedroliman/heormodel
  description: "Health economic evaluation in Python: parameter sampling, cost-effectiveness analysis, value of information, sensitivity analysis, and Bayesian calibration across cohort, microsimulation, discrete-event, and compartmental models."
  image: /images/og-card.png
  image-alt: "heormodel: health economic evaluation in Python."
  open-graph: true
  twitter-card:
    card-style: summary_large_image
  page-navigation: true
  back-to-top-navigation: true
  google-analytics: "G-J6M5ECXYJC"
  search:
    location: navbar
    type: overlay
  navbar:
    title: heormodel
    left:
      - href: index.qmd
        text: Get started
      - href: tutorials/index.qmd
        text: Tutorials
      - href: reference/index.qmd
        text: Reference
    right:
      - href: changelog.md
        text: Changelog
      - icon: github
        href: https://github.com/pedroliman/heormodel
        aria-label: GitHub repository
  sidebar:
    - id: tutorials
      title: Tutorials
      style: docked
      contents:
        - href: tutorials/index.qmd
          text: All tutorials
        - section: Getting started
          contents:
            - href: tutorials/full-pipeline.qmd
              text: Full pipeline
            - href: tutorials/byo-outputs.qmd
              text: Bring your own outputs
            - href: tutorials/parameter-inputs.qmd
              text: Parameter inputs from data
        - section: Model engines
          contents:
            - href: tutorials/mdm-cohort.qmd
              text: Cohort state-transition model
            - href: tutorials/microsim.qmd
              text: Microsimulation engine
            - href: tutorials/markov-vs-microsim.qmd
              text: Markov vs microsimulation models
            - href: tutorials/des.qmd
              text: Discrete-event simulation
            - href: tutorials/seir-vaccination.qmd
              text: Compartmental transmission model
        - section: Sensitivity and value of information
          contents:
            - href: tutorials/dsa.qmd
              text: Deterministic sensitivity analysis
            - href: tutorials/voi.qmd
              text: Value of information
        - section: Calibration
          contents:
            - href: tutorials/calibration-workflow.qmd
              text: Calibration workflow
            - href: tutorials/calibrate-abc.qmd
              text: Calibrating with ABC
            - href: tutorials/calibrate-sbi.qmd
              text: Calibrating with simulation-based inference
            - href: tutorials/surrogate-calibration.qmd
              text: Surrogate-accelerated calibration
            - href: tutorials/calibrate-microsim.qmd
              text: Calibrating a stochastic microsimulation
        - section: Replications
          contents:
            - href: tutorials/replication-gallery.qmd
              text: Replication gallery
            - href: tutorials/mdm-cohort-timedep.qmd
              text: Time-dependent cohort model
            - href: tutorials/mdm-microsim.qmd
              text: Microsimulation replication
            - href: tutorials/mdm-des.qmd
              text: Discrete-event simulation replication
  page-footer:
    left: |
      © 2026 [Pedro Nascimento de Lima](https://pedrodelima.com)
    right:
      - icon: github
        href: https://github.com/pedroliman/heormodel
        aria-label: GitHub repository

format:
  html:
    theme:
      light: [flatly, theme.scss]
      dark: [darkly, theme.scss]
    toc: true
    code-copy: true
    code-tools: true
    # Render figures at a high resolution so plot text stays sharp on
    # high-density displays.
    fig-format: retina
    fig-dpi: 150
    include-in-header:
      - _structured-data.html

metadata-files:
  - reference/_sidebar.yml

filters:
  - keywords
  - interlinks

interlinks:
  sources:
    numpy:
      url: https://numpy.org/doc/stable/
    pandas:
      url: https://pandas.pydata.org/docs/
    scipy:
      url: https://docs.scipy.org/doc/scipy/

quartodoc:
  package: heormodel
  dir: reference
  title: API reference
  parser: google
  sidebar: reference/_sidebar.yml
  render_interlinks: true
  sections:
    - title: Parameters (`heormodel.params`)
      desc: Distributions specified directly or from mean and standard error, with correlated sampling into a parameter draw matrix.
      package: heormodel.params
      contents:
        - Distribution
        - Normal
        - LogNormal
        - Beta
        - Gamma
        - Uniform
        - Fixed
        - Dirichlet
        - ParameterSet
        - single_draw
        - read_draws
        - resample_posterior
        - mix_draws
    - title: Models (`heormodel.models`)
      desc: The `Outcomes` structure every engine returns, the `ModelEngine` contract, the cohort state-transition, microsimulation, discrete-event, and ordinary differential equation engines, and state occupancy over time from an event history.
      package: heormodel.models
      contents:
        - Outcomes
        - ModelEngine
        - ModelFn
        - MarkovModel
        - CohortSpec
        - MicrosimModel
        - DESModel
        - ODEModel
        - ODESpec
        - queue_waits
        - state_occupancy
        - LifeTable
    - title: Run loop (`heormodel.run`)
      desc: Drive a model over parameter draws, or ingest external results tables.
      package: heormodel.run
      contents:
        - SeedManager
        - run_psa
        - as_outcomes
        - running_means
    - title: Cost-effectiveness analysis (`heormodel.cea`)
      desc: Incremental cost-effectiveness ratios, dominance, the efficiency frontier, net benefit, and acceptability curves.
      package: heormodel.cea
      contents:
        - icer_table
        - frontier
        - nmb
        - nhb
        - expected_nmb
        - ceac
        - ceaf
        - expected_loss
        - ce_plane
        - STATUS_D
        - STATUS_ED
        - STATUS_ND
    - title: Deterministic sensitivity analysis (`heormodel.dsa`)
      desc: One-way, one-at-a-time, and full-factorial grid scenario designs that run through the standard loop and feed tornado and heatmap reports.
      package: heormodel.dsa
      contents:
        - one_way
        - one_at_a_time
        - grid
        - Design
    - title: Value of information (`heormodel.voi`)
      desc: Expected value of perfect, partial perfect, and sample information.
      package: heormodel.voi
      contents:
        - evpi
        - evppi
        - evppi_ranking
        - simulate_summaries
        - evsi_regression
        - evsi_moment_matching
        - evsi_importance_sampling
    - title: Calibration (`heormodel.calibrate`)
      desc: Bayesian calibration; the posterior returns as a standard draw matrix. Requires the `calibration` extra.
      package: heormodel.calibrate
      contents:
        - TargetSimulator
        - abc_calibrate
        - CalibrationResult
        - to_pyabc_prior
    - title: Reporting (`heormodel.report`)
      desc: Standard plots, provenance capture, and run reports.
      package: heormodel.report
      contents:
        - format_icer_table
        - plot_ce_plane
        - plot_ceac
        - plot_expected_loss
        - plot_frontier
        - tornado_data
        - plot_tornado
        - heatmap_data
        - intervention_colors
        - PALETTE
        - capture_run
        - RunRecord
