project:
  type: website
  pre-render: _prerender.py

website:
  title: heormodel
  site-url: https://pedroliman.github.io/heormodel/
  repo-url: https://github.com/pedroliman/heormodel
  page-navigation: true
  google-analytics: "G-J6M5ECXYJC"
  sidebar:
    - id: main
      style: docked
      search: true
      contents:
        - href: index.qmd
          text: Overview
        - section: Tutorials
          contents:
            - href: tutorials/mdm-cohort.qmd
              text: Markov cohort model
            - href: tutorials/microsim.qmd
              text: Microsimulation engine
            - href: tutorials/byo-outputs.qmd
              text: Bring your own outputs
            - href: tutorials/markov-vs-microsim.qmd
              text: Markov vs microsimulation models
            - href: tutorials/des.qmd
              text: Discrete-event simulation
            - href: tutorials/full-pipeline.qmd
              text: Full pipeline
            - href: tutorials/voi.qmd
              text: Value of information
            - href: tutorials/calibration-workflow.qmd
              text: Calibration workflow
            - href: tutorials/parameter-inputs.qmd
              text: Parameter inputs from data
            - href: tutorials/dsa.qmd
              text: Deterministic sensitivity analysis
        - section: Replications
          contents:
            - href: tutorials/replication-gallery.qmd
              text: Replication gallery
            - href: tutorials/mdm-cohort-timedep.qmd
              text: Time-dependent cohort model
            - href: tutorials/mdm-microsim.qmd
              text: Microsimulation replication
            - href: tutorials/mdm-des.qmd
              text: Discrete-event simulation replication
        - section: Concepts
          contents:
            - href: concepts/engines.qmd
              text: Engines
        - section: Reference & Info
          contents:
            - href: reference/index.qmd
              text: API reference
            - href: changelog.md
              text: Changelog
  navbar:
    right:
      - icon: github
        href: https://github.com/pedroliman/heormodel
  page-footer: |
    © 2026 [Pedro Nascimento de Lima](https://pedrodelima.com)

format:
  html:
    theme:
      light: flatly
      dark: darkly
    toc: true
    code-copy: true

metadata-files:
  - reference/_sidebar.yml

filters:
  - interlinks

interlinks:
  sources:
    numpy:
      url: https://numpy.org/doc/stable/
    pandas:
      url: https://pandas.pydata.org/docs/
    scipy:
      url: https://docs.scipy.org/doc/scipy/

quartodoc:
  package: heormodel
  dir: reference
  title: API reference
  parser: google
  sidebar: reference/_sidebar.yml
  render_interlinks: true
  sections:
    - title: Parameters (`heormodel.params`)
      desc: Distributions specified directly or from mean and standard error, with correlated sampling into a parameter draw matrix.
      package: heormodel.params
      contents:
        - Distribution
        - Normal
        - LogNormal
        - Beta
        - Gamma
        - Uniform
        - Fixed
        - Dirichlet
        - ParameterSet
        - single_draw
        - read_draws
        - resample_posterior
        - mix_draws
    - title: Models (`heormodel.models`)
      desc: The `Outcomes` structure every engine returns, the `ModelEngine` contract, the cohort state-transition, microsimulation, and discrete-event engines, and state occupancy over time from an event history.
      package: heormodel.models
      contents:
        - Outcomes
        - ModelEngine
        - ModelFn
        - MarkovModel
        - CohortSpec
        - MicrosimModel
        - DESModel
        - queue_waits
        - state_occupancy
        - LifeTable
    - title: Run loop (`heormodel.run`)
      desc: Drive a model over parameter draws, or ingest external results tables.
      package: heormodel.run
      contents:
        - SeedManager
        - run_psa
        - as_outcomes
        - running_means
    - title: Cost-effectiveness analysis (`heormodel.cea`)
      desc: Incremental cost-effectiveness ratios, dominance, the efficiency frontier, net benefit, and acceptability curves.
      package: heormodel.cea
      contents:
        - icer_table
        - frontier
        - nmb
        - nhb
        - expected_nmb
        - ceac
        - ceaf
        - expected_loss
        - ce_plane
        - STATUS_D
        - STATUS_ED
        - STATUS_ND
    - title: Deterministic sensitivity analysis (`heormodel.dsa`)
      desc: One-way, one-at-a-time, and full-factorial grid scenario designs that run through the standard loop and feed tornado and heatmap reports.
      package: heormodel.dsa
      contents:
        - one_way
        - one_at_a_time
        - grid
        - Design
    - title: Value of information (`heormodel.voi`)
      desc: Expected value of perfect, partial perfect, and sample information.
      package: heormodel.voi
      contents:
        - evpi
        - evppi
        - evppi_ranking
        - simulate_summaries
        - evsi_regression
        - evsi_moment_matching
        - evsi_importance_sampling
    - title: Calibration (`heormodel.calibrate`)
      desc: Bayesian calibration; the posterior returns as a standard draw matrix. Requires the `calibration` extra.
      package: heormodel.calibrate
      contents:
        - TargetSimulator
        - abc_calibrate
        - CalibrationResult
        - to_pyabc_prior
    - title: Reporting (`heormodel.report`)
      desc: Standard plots, provenance capture, and run reports.
      package: heormodel.report
      contents:
        - plot_ce_plane
        - plot_ceac
        - plot_expected_loss
        - plot_frontier
        - tornado_data
        - plot_tornado
        - heatmap_data
        - strategy_colors
        - PALETTE
        - capture_run
        - RunRecord
